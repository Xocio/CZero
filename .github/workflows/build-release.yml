name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "版本标签（留空自动读取 module.prop）"
        required: false
        default: ""
      title:
        description: "Release 标题 (留空则用版本标签)"
        required: false
        default: ""
      changelog:
        description: "更新内容（用 \\n 表示换行）"
        required: true
      prerelease:
        description: "标记为预发布 (pre-release)"
        type: boolean
        required: false
        default: false
      notify:
        description: "推送到 Telegram 频道"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Resolve NDK
        id: ndk
        run: |
          set -euo pipefail
          NDK="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [ -z "$NDK" ] || [ ! -d "$NDK" ]; then
            echo "找不到预装 NDK (ANDROID_NDK_LATEST_HOME / ANDROID_NDK_ROOT)"; exit 1
          fi
          BIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"
          echo "使用 NDK: $NDK"
          "$BIN/clang++" --version | head -1

      - name: Compile native binaries
        env:
          NDK_BIN: ${{ steps.ndk.outputs.bin }}
        run: |
          set -euo pipefail
          CLANGXX="$NDK_BIN/clang++"
          STRIP="$NDK_BIN/llvm-strip"
          TARGET="aarch64-linux-android28"

          CXXFLAGS="--target=$TARGET -std=c++17 -Oz -I. -static-libstdc++ -fno-rtti \
            -ffunction-sections -fdata-sections -fvisibility=hidden -fomit-frame-pointer \
            -Wl,--gc-sections -Wl,--as-needed -Wl,-s -Wl,--build-id=none"

          build_cpp() {
            echo "  [C++] $1"
            "$CLANGXX" $CXXFLAGS -o "$2" "$1.cpp"
            "$STRIP" --strip-all "$2" || true
          }
          build_go() {
            echo "  [Go ] $1"
            GOOS=android GOARCH=arm64 CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -buildid=" -o "$2" "$1"
          }

          build_cpp service service
          build_cpp cron/timer_daemon cron/timer_daemon
          build_cpp list/Tencent/check list/Tencent/check
          build_cpp list/suppress/suppress list/suppress/suppress
          build_cpp list/Emptyfolder/emptyfolder list/Emptyfolder/emptyfolder
          build_cpp list/GCclean/GCclean1 list/GCclean/GCclean1
          build_cpp list/zero list/zero

          build_go list/Tencent/tencentmm.go list/Tencent/tencentmm
          build_go list/Tencent/mobileqq.go  list/Tencent/mobileqq
          build_go list/Tencent/ugcaweme.go  list/Tencent/ugcaweme
          build_go list/customize.go         list/customize

      - name: Verify ELF (arch + no libc++_shared)
        run: |
          set -euo pipefail
          for f in service cron/timer_daemon list/Tencent/check list/suppress/suppress \
                   list/Emptyfolder/emptyfolder list/GCclean/GCclean1 list/zero; do
            info=$(file "$f")
            echo "$info"
            echo "$info" | grep -qi 'aarch64' || { echo "$f 非 aarch64"; exit 1; }
            if readelf -d "$f" 2>/dev/null | grep -qi 'libc++_shared'; then
              echo "$f 动态依赖 libc++_shared.so —— 静态链接失败"; exit 1
            fi
          done
          echo "全部二进制校验通过"

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          IN="${{ github.event.inputs.version_tag }}"
          if [ -n "$IN" ]; then
            VER="$IN"
          else
            VER=$(grep '^version=' module.prop | cut -d= -f2 | tr -d '[:space:]')
          fi
          [ -n "$VER" ] || { echo "无法确定版本号"; exit 1; }
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "版本: $VER"

      - name: Package Magisk zip
        id: pack
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          STAGE="dist/CZero"
          rm -rf dist && mkdir -p "$STAGE"

          FILES=(
            module.prop customize.sh service.sh config.json
            service
            cron/timer_daemon
            list/Tencent/check list/Tencent/tencentmm list/Tencent/mobileqq list/Tencent/ugcaweme
            list/suppress/suppress
            list/Emptyfolder/emptyfolder list/Emptyfolder/directories.prop list/Emptyfolder/emptyfolder_white.prop
            list/GCclean/GCclean1
            list/clean_paths.prop list/clean_whitelist.prop list/customize list/zero
          )
          for f in "${FILES[@]}"; do
            if [ -e "$f" ]; then
              cp --parents "$f" "$STAGE/"
            else
              echo "  跳过(缺失): $f"
            fi
          done
          cp -r META-INF "$STAGE/"
          [ -d list/backup ] && cp -r list/backup "$STAGE/list/"

          ZIP="CZero_${VER}.zip"
          ( cd "$STAGE" && zip -qr "../../$ZIP" . )
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          ls -lh "$ZIP"

      - name: Collect APK
        id: apk
        run: |
          set -euo pipefail
          APK=$(ls -1 *.apk 2>/dev/null | head -1 || true)
          if [ -n "$APK" ]; then
            echo "找到 APK: $APK"
            echo "apk=$APK" >> "$GITHUB_OUTPUT"
          else
            echo "仓库根目录无 APK，Release 将只含 zip"
            echo "apk=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ steps.ver.outputs.version }}
          ZIP: ${{ steps.pack.outputs.zip }}
          APK: ${{ steps.apk.outputs.apk }}
          TITLE: ${{ github.event.inputs.title }}
          BODY: ${{ github.event.inputs.changelog }}
          PRE: ${{ github.event.inputs.prerelease }}
        run: |
          set -euo pipefail
          NAME="${TITLE:-$VER}"
          BODY_REAL="${BODY//\\n/$'\n'}"
          ARGS=( "$VER" --title "$NAME" --notes "$BODY_REAL" --target "$GITHUB_SHA" )
          [ "$PRE" = "true" ] && ARGS+=( --prerelease )

          ASSETS=( "$ZIP" )
          [ -n "$APK" ] && ASSETS+=( "$APK" )

          gh release create "${ARGS[@]}" "${ASSETS[@]}" --repo "$GITHUB_REPOSITORY"
          echo "已发布 Release $VER，资源: ${ASSETS[*]}"

      - name: Prepare Telegram Message
        if: ${{ inputs.notify }}
        id: telegram_message
        env:
          CHANGELOG_BODY: ${{ github.event.inputs.changelog }}
        run: |
          set -euo pipefail
          BODY_REAL="${CHANGELOG_BODY//\\n/$'\n'}"

          escape_md_v2_code() {
            perl -pe 's/([`\\])/\\$1/g'
          }

          CHANGELOG_ESCAPED=$(printf "%s" "$BODY_REAL" | escape_md_v2_code)

          {
            echo 'changelog_body<<EOF'
            echo "$CHANGELOG_ESCAPED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download Release Asset
        if: ${{ inputs.notify }}
        id: download_asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail

          RELEASE_INFO=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME")

          ZIP_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -n 1)
          ZIP_NAME=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | endswith(".zip")) | .name' | head -n 1)
          APK_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          APK_NAME=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | endswith(".apk")) | .name' | head -n 1)

          if [ -z "$ZIP_URL" ] || [ "$ZIP_URL" = "null" ]; then
            echo "Release asset not found for tag: $TAG_NAME"
            exit 1
          fi

          curl -sS -f -L --retry 3 --retry-delay 2 -o "$ZIP_NAME" "$ZIP_URL"
          [ -s "$ZIP_NAME" ] || { echo "下载的 zip 是空的"; exit 1; }
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

          if [ -n "$APK_URL" ] && [ "$APK_URL" != "null" ]; then
            curl -sS -f -L --retry 3 --retry-delay 2 -o "$APK_NAME" "$APK_URL"
            [ -s "$APK_NAME" ] || { echo "下载的 apk 是空的"; exit 1; }
            echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "apk_name=" >> "$GITHUB_OUTPUT"
          fi

      - name: Send to Telegram
        if: ${{ inputs.notify }}
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          VERSION: ${{ steps.ver.outputs.version }}
          COMMIT_HASH_RAW: ${{ github.sha }}
          CHANGELOG_BODY: ${{ steps.telegram_message.outputs.changelog_body }}
          REPOSITORY_URL: https://github.com/${{ github.repository }}
          DOCS_URL: https://czeropage.top
          ZIP_NAME: ${{ steps.download_asset.outputs.zip_name }}
        run: |
          set -euo pipefail

          escape_md_v2() {
            perl -pe 's/([_*\[\]()~`>#+\-=|{}.!\\])/\\$1/g'
          }
          escape_md_v2_code() {
            perl -pe 's/([`\\])/\\$1/g'
          }
          escape_md_v2_url() {
            perl -pe 's/([)\\])/\\$1/g'
          }

          COMMIT_HASH="${COMMIT_HASH_RAW:0:7}"
          COMMIT_DATE=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M CST')

          VERSION_ESCAPED=$(printf "%s" "$VERSION" | escape_md_v2)
          COMMIT_HASH_ESCAPED=$(printf "%s" "$COMMIT_HASH" | escape_md_v2_code)
          COMMIT_DATE_ESCAPED=$(printf "%s" "$COMMIT_DATE" | escape_md_v2)
          REPOSITORY_URL_ESCAPED=$(printf "%s" "$REPOSITORY_URL" | escape_md_v2_url)
          DOCS_URL_ESCAPED=$(printf "%s" "$DOCS_URL" | escape_md_v2_url)

          MESSAGE=$(cat <<EOF
          *CZero Build & Release*

          *版本:* $VERSION_ESCAPED
          *提交:* \`$COMMIT_HASH_ESCAPED\`
          *日期:* $COMMIT_DATE_ESCAPED
          \`\`\`
          $CHANGELOG_BODY
          \`\`\`

          [仓库地址]($REPOSITORY_URL_ESCAPED) \| [项目文档]($DOCS_URL_ESCAPED)
          EOF
          )

          curl -sS -f -F "document=@${ZIP_NAME}" \
            --form-string "chat_id=$TG_CHAT_ID" \
            --form-string "caption=$MESSAGE" \
            --form-string "parse_mode=MarkdownV2" \
            "https://api.telegram.org/bot$TG_BOT_TOKEN/sendDocument"

      - name: Send APK to Telegram
        if: ${{ inputs.notify && steps.download_asset.outputs.apk_name != '' }}
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          APK_NAME: ${{ steps.download_asset.outputs.apk_name }}
        run: |
          set -euo pipefail
          curl -sS -f -F "document=@${APK_NAME}" \
            --form-string "chat_id=$TG_CHAT_ID" \
            "https://api.telegram.org/bot$TG_BOT_TOKEN/sendDocument"